<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub AI Chatbot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 100%;
      max-width: 600px;
      height: 80vh;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #24292e;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .chat-header h1 {
      font-size: 1.5rem;
      margin-bottom: 5px;
    }

    .chat-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    .chat-controls button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.3s;
    }

    .btn-load {
      background: #2ea44f;
      color: white;
    }

    .btn-load:hover {
      background: #2c974b;
    }

    .btn-clear {
      background: #cb2431;
      color: white;
    }

    .btn-clear:hover {
      background: #b31d28;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #0366d6;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f6f8fa;
      color: #24292e;
      border-bottom-left-radius: 4px;
    }

    .chat-input-container {
      padding: 20px;
      background: #fafbfc;
      border-top: 1px solid #e1e4e8;
      display: flex;
      gap: 10px;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .chat-input:focus {
      border-color: #0366d6;
    }

    .send-btn {
      padding: 12px 24px;
      background: #0366d6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.3s;
    }

    .send-btn:hover {
      background: #0255b3;
    }

    .send-btn:disabled {
      background: #959da5;
      cursor: not-allowed;
    }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: #f6f8fa;
      padding: 12px 16px;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #6a737d;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>🤖 GitHub AI Chatbot</h1>
      <div class="chat-controls">
        <button class="btn-load" onclick="loadHistory()">Load History</button>
        <button class="btn-clear" onclick="clearHistory()">Clear History</button>
      </div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
      <!-- Messages will be added here -->
    </div>
    
    <div class="typing-indicator" id="typingIndicator">
      <span></span><span></span><span></span>
    </div>
    
    <div class="chat-input-container">
      <input 
        type="text" 
        class="chat-input" 
        id="chatInput" 
        placeholder="Type your message..."
        onkeypress="handleKeyPress(event)"
      >
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api/chat';
    const STORAGE_KEY = 'github_chat_history';
    
    let chatHistory = [];

    // Initialize chat
    function init() {
      loadFromStorage();
      renderMessages();
    }

    // Save to localStorage
    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
    }

    // Load from localStorage
    function loadFromStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          chatHistory = JSON.parse(stored);
        } catch (e) {
          console.error('Failed to parse stored history:', e);
          chatHistory = [];
        }
      }
    }

    // Render all messages
    function renderMessages() {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      
      chatHistory.forEach(msg => {
        addMessageToDOM(msg.role, msg.content);
      });
      
      scrollToBottom();
    }

    // Add message to DOM
    function addMessageToDOM(role, content) {
      const container = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      messageDiv.textContent = content;
      container.appendChild(messageDiv);
      scrollToBottom();
    }

    // Scroll to bottom of messages
    function scrollToBottom() {
      const container = document.getElementById('chatMessages');
      container.scrollTop = container.scrollHeight;
    }

    // Handle Enter key
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    // Send message
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const typingIndicator = document.getElementById('typingIndicator');
      const message = input.value.trim();

      if (!message) return;

      // Disable input while processing
      input.disabled = true;
      sendBtn.disabled = true;

      // Add user message to history and DOM
      chatHistory.push({ role: 'user', content: message });
      addMessageToDOM('user', message);
      saveToStorage();

      // Clear input
      input.value = '';

      // Show typing indicator
      typingIndicator.style.display = 'block';
      scrollToBottom();

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ messages: chatHistory })
        });

        if (!response.ok) {
          throw new Error('Failed to get response');
        }

        const data = await response.json();
        
        // Add assistant response to history and DOM
        chatHistory.push({ role: 'assistant', content: data.content });
        addMessageToDOM('assistant', data.content);
        saveToStorage();
      } catch (error) {
        console.error('Error:', error);
        addMessageToDOM('assistant', 'Sorry, an error occurred. Please try again.');
      } finally {
        // Hide typing indicator
        typingIndicator.style.display = 'none';
        
        // Re-enable input
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    // Load history from localStorage
    function loadHistory() {
      loadFromStorage();
      renderMessages();
    }

    // Clear history
    function clearHistory() {
      if (confirm('Are you sure you want to clear the chat history?')) {
        chatHistory = [];
        localStorage.removeItem(STORAGE_KEY);
        renderMessages();
      }
    }

    // Initialize on page load
    init();
  </script>
</body>
</html>
